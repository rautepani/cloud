<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Page</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1208;
      --paper: #f5f0e8;
      --accent: #c84b2f;
      --muted: #8a7f72;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c84b2f' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .card {
      max-width: 640px;
      width: 100%;
      border: 1.5px solid var(--ink);
      padding: 3rem 3.5rem;
      position: relative;
      animation: fadeUp 0.7s ease both;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 5px 5px -5px -5px;
      border: 1.5px solid var(--ink);
      z-index: -1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tag {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
      display: block;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.15;
      margin-bottom: 1.5rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    p {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--muted);
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--ink);
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      background: var(--ink);
      color: var(--paper);
      text-decoration: none;
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      background: var(--accent);
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="tag">Welcome</span>
    <h1>Hello, <em>World.</em></h1>
    <div class="divider"></div>
    <p>
      This is a simple starting point — clean, structured, and ready for whatever you'd like to build next. Edit the HTML, add your content, and make it your own.
    </p>
    <a href="#" class="btn">Get Started</a>
  </div>
</body>
</html>
